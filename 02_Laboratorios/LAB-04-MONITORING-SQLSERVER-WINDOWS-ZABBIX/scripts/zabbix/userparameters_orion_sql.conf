# ORION LAB-04 - SQL Server custom checks for Zabbix Agent 2
#
# Copy this file to:
# C:\Program Files\Zabbix Agent 2\zabbix_agent2.d\userparameters_orion_sql.conf
#
# The script and local config file must exist on each SQL node:
# C:\ProgramData\ORION\ZabbixSql\03-check-sql-dmv.ps1
# C:\ProgramData\ORION\ZabbixSql\orion_sql_monitor.env
#
# Local config format:
# Server=tcp:localhost,1433
#
# SQL checks use Windows Authentication through the Zabbix Agent 2 service account:
# ORION\svc_zbx_sqlmon
#
# No SQL logins or secrets are stored in Git or local config files.

UserParameter=orion.sql.ping,C:\Windows\System32\WindowsPowerShell\v1.0\powershell.exe -NoProfile -ExecutionPolicy Bypass -File "C:\ProgramData\ORION\ZabbixSql\03-check-sql-dmv.ps1" -Check ping
UserParameter=orion.sql.service.running,C:\Windows\System32\WindowsPowerShell\v1.0\powershell.exe -NoProfile -ExecutionPolicy Bypass -File "C:\ProgramData\ORION\ZabbixSql\03-check-sql-dmv.ps1" -Check sql_service
UserParameter=orion.sql.agent.running,C:\Windows\System32\WindowsPowerShell\v1.0\powershell.exe -NoProfile -ExecutionPolicy Bypass -File "C:\ProgramData\ORION\ZabbixSql\03-check-sql-dmv.ps1" -Check agent_service
UserParameter=orion.sql.sessions.user,C:\Windows\System32\WindowsPowerShell\v1.0\powershell.exe -NoProfile -ExecutionPolicy Bypass -File "C:\ProgramData\ORION\ZabbixSql\03-check-sql-dmv.ps1" -Check user_sessions
UserParameter=orion.sql.blocking.sessions,C:\Windows\System32\WindowsPowerShell\v1.0\powershell.exe -NoProfile -ExecutionPolicy Bypass -File "C:\ProgramData\ORION\ZabbixSql\03-check-sql-dmv.ps1" -Check blocking_sessions
UserParameter=orion.sql.jobs.failed24h,C:\Windows\System32\WindowsPowerShell\v1.0\powershell.exe -NoProfile -ExecutionPolicy Bypass -File "C:\ProgramData\ORION\ZabbixSql\03-check-sql-dmv.ps1" -Check failed_jobs_24h
UserParameter=orion.sql.backup.full.age.hours[*],C:\Windows\System32\WindowsPowerShell\v1.0\powershell.exe -NoProfile -ExecutionPolicy Bypass -File "C:\ProgramData\ORION\ZabbixSql\03-check-sql-dmv.ps1" -Check backup_full_age_hours -DatabaseName "$1"
UserParameter=orion.sql.backup.log.age.hours[*],C:\Windows\System32\WindowsPowerShell\v1.0\powershell.exe -NoProfile -ExecutionPolicy Bypass -File "C:\ProgramData\ORION\ZabbixSql\03-check-sql-dmv.ps1" -Check backup_log_age_hours -DatabaseName "$1"
UserParameter=orion.sql.ag.health,C:\Windows\System32\WindowsPowerShell\v1.0\powershell.exe -NoProfile -ExecutionPolicy Bypass -File "C:\ProgramData\ORION\ZabbixSql\03-check-sql-dmv.ps1" -Check ag_health
UserParameter=orion.sql.ag.is_primary[*],C:\Windows\System32\WindowsPowerShell\v1.0\powershell.exe -NoProfile -ExecutionPolicy Bypass -File "C:\ProgramData\ORION\ZabbixSql\03-check-sql-dmv.ps1" -Check is_primary -DatabaseName "$1"
